<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bob & Elle Budget 2026</title>
<link rel="manifest" href="data:application/json,{}">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d1a;--card:#1a1a2e;--purple:#a855f7;--teal:#2dd4bf;--text:#e2e8f0;--muted:#64748b;--danger:#ef4444;--warn:#f59e0b;--ok:#22c55e}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:80px}
.header{background:linear-gradient(135deg,#1e1b4b,#0f766e);padding:14px 20px;text-align:center;position:sticky;top:0;z-index:10}
.header h1{font-size:1.2rem;background:linear-gradient(90deg,var(--purple),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.month-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:6px}
.month-nav button{background:none;border:none;color:var(--teal);font-size:1.4rem;padding:4px 10px;cursor:pointer}
.month-nav span{font-size:.95rem;color:var(--text);min-width:120px}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 16px}
.stat{background:var(--card);border-radius:12px;padding:10px 6px;text-align:center}
.stat label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat .val{font-size:1rem;font-weight:700;margin-top:2px}
.green{color:var(--ok)}.red{color:var(--danger)}.purple{color:var(--purple)}.teal{color:var(--teal)}
.tabs{display:flex;padding:8px 16px;gap:6px}
.tabs button{flex:1;padding:8px;border:none;border-radius:8px;background:var(--card);color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer}
.tabs button.active{background:linear-gradient(135deg,var(--purple),var(--teal));color:#fff}
.view{padding:0 16px 16px;display:none}.view.active{display:block}
/* Category cards */
.cat-card{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.cat-card:active{transform:scale(.98)}
.cat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cat-head .left{display:flex;align-items:center;gap:8px}
.cat-head .emoji{font-size:1.1rem}
.cat-head .name{font-weight:600;font-size:.85rem}
.cat-head .amounts{text-align:right;font-size:.78rem;line-height:1.4}
.cat-head .spent{font-weight:700}
.bar-bg{height:5px;background:#2a2a3e;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-fill.ok{background:var(--teal)}.bar-fill.warn{background:var(--warn)}.bar-fill.over{background:var(--danger)}
.sub-items{font-size:.7rem;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid #2a2a3e;display:none}
.cat-card.expanded .sub-items{display:block}
.sub-row{display:flex;justify-content:space-between;padding:2px 0}
/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--teal));border:none;color:#fff;font-size:2rem;z-index:20;cursor:pointer;box-shadow:0 4px 20px rgba(168,85,247,.4)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);width:100%;max-width:500px;border-radius:20px 20px 0 0;padding:20px 20px 32px;max-height:88dvh;overflow-y:auto}
.modal h2{text-align:center;margin-bottom:14px;font-size:1rem}
.who-toggle{display:flex;gap:8px;margin-bottom:12px}
.who-toggle button{flex:1;padding:10px;border:2px solid var(--card);border-radius:10px;background:#2a2a3e;color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer}
.who-toggle button.sel{border-color:var(--teal);background:#0f766e33}
.amount-input{width:100%;padding:14px;font-size:1.5rem;text-align:center;background:#2a2a3e;border:2px solid transparent;border-radius:12px;color:var(--text);font-weight:700;outline:none;margin-bottom:10px}
.amount-input:focus{border-color:var(--purple)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.cat-btn{padding:10px 2px;border:2px solid transparent;border-radius:10px;background:#2a2a3e;color:var(--text);font-size:.65rem;text-align:center;cursor:pointer;line-height:1.3}
.cat-btn .em{font-size:1.2rem;display:block;margin-bottom:2px}
.cat-btn.sel{border-color:var(--purple);background:#a855f722}
.cat-btn .left-amt{display:block;font-size:.6rem;color:var(--muted);margin-top:1px}
.note-input{width:100%;padding:10px;background:#2a2a3e;border:none;border-radius:10px;color:var(--text);font-size:.85rem;margin-bottom:12px;outline:none}
.save-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--teal));color:#fff;font-size:1rem;font-weight:700;cursor:pointer}
.save-btn:disabled{opacity:.4}
/* History */
.day-header{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 4px}
.expense-item{display:flex;align-items:center;background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:5px;gap:10px}
.expense-item .em{font-size:1.1rem}
.expense-item .info{flex:1}
.expense-item .info .top{display:flex;justify-content:space-between;font-size:.82rem;font-weight:600}
.expense-item .info .bot{font-size:.68rem;color:var(--muted);margin-top:1px}
.expense-item .del{background:none;border:none;color:var(--danger);font-size:.9rem;padding:4px 8px;cursor:pointer;opacity:.4}
/* Settings */
.section-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:12px 0 6px}
.setting-row{display:flex;align-items:center;background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:6px;gap:8px}
.setting-row .em{font-size:1.1rem}
.setting-row .name{flex:1;font-size:.82rem;font-weight:600}
.setting-row .sub{font-size:.65rem;color:var(--muted)}
.setting-row input{width:80px;padding:6px 8px;background:#2a2a3e;border:1px solid #3a3a5e;border-radius:8px;color:var(--text);text-align:right;font-size:.82rem;outline:none}
.setting-row input:focus{border-color:var(--purple)}
.action-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.action-btns button{flex:1;min-width:calc(50% - 4px);padding:10px;border:none;border-radius:10px;background:#2a2a3e;color:var(--teal);font-size:.78rem;font-weight:600;cursor:pointer}
.action-btns button.danger{color:var(--danger)}
.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.85rem;line-height:1.6}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:50;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
<h1>💰 Bob & Elle · 2026</h1>
<div class="month-nav">
<button onclick="changeMonth(-1)">‹</button>
<span id="monthLabel"></span>
<button onclick="changeMonth(1)">›</button>
</div>
</div>
<div class="summary">
<div class="stat"><label>Budget</label><div class="val purple" id="sBudget">$0</div></div>
<div class="stat"><label>Spent</label><div class="val" id="sSpent">$0</div></div>
<div class="stat"><label>Remaining</label><div class="val" id="sLeft">$0</div></div>
</div>
<div class="tabs">
<button class="active" onclick="showTab('overview')">Overview</button>
<button onclick="showTab('history')">History</button>
<button onclick="showTab('settings')">Budget</button>
</div>
<div class="view active" id="v-overview"></div>
<div class="view" id="v-history"></div>
<div class="view" id="v-settings"></div>
<button class="fab" onclick="openModal()">+</button>
<div class="modal-overlay" id="modal" onclick="closeIfBg(event)">
<div class="modal">
<h2>Add Expense</h2>
<div class="who-toggle"><button onclick="pickWho('Bob')" id="wBob">🧔 Bob</button><button onclick="pickWho('Elle')" id="wElle">👩 Elle</button></div>
<input class="amount-input" id="amtInput" type="number" inputmode="decimal" placeholder="$0.00" step="0.01">
<div class="cat-grid" id="catGrid"></div>
<input class="note-input" id="noteInput" placeholder="Note (optional)">
<button class="save-btn" id="saveBtn" onclick="saveExpense()" disabled>Add Expense</button>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
// ── CATEGORY DEFINITIONS ──
// Quick-add categories (the 8 buttons users tap daily)
const QUICK_CATS=[
  {id:'groceries',   name:'Groceries',     emoji:'🛒',  budget:2000},
  {id:'restaurants', name:'Restaurants',    emoji:'🍽️', budget:800},
  {id:'personal',    name:'Personal',      emoji:'🧴',  budget:500},
  {id:'transport',   name:'Transport/Gas',  emoji:'⛽',  budget:1840},
  {id:'health',      name:'Health/Medical', emoji:'🏥',  budget:30},
  {id:'kids',        name:'Kids',           emoji:'👧',  budget:900},
  {id:'utilities',   name:'Utilities',      emoji:'💡',  budget:522},
  {id:'other',       name:'Other',          emoji:'🎲',  budget:0}
];

// Full budget categories (shown in overview & settings, includes fixed costs)
const ALL_CATS=[
  // Everyday (broken into sub-cats for quick-add)
  {id:'groceries',   name:'Groceries',       emoji:'🛒',  budget:2000, group:'Everyday'},
  {id:'restaurants', name:'Restaurants',      emoji:'🍽️', budget:800,  group:'Everyday'},
  {id:'personal',    name:'Personal Supplies',emoji:'🧴',  budget:500,  group:'Everyday'},
  // Variable
  {id:'transport',   name:'Transportation',   emoji:'⛽',  budget:1840, group:'Variable'},
  {id:'health',      name:'Health/Medical',    emoji:'🏥',  budget:30,   group:'Variable'},
  {id:'kids',        name:'Children',          emoji:'👧',  budget:900,  group:'Variable'},
  {id:'utilities',   name:'Utilities',         emoji:'💡',  budget:522,  group:'Variable'},
  {id:'pets',        name:'Pets',              emoji:'🐾',  budget:50,   group:'Variable'},
  // Fixed monthly
  {id:'home',        name:'Home/Rent',         emoji:'🏠',  budget:3500, group:'Fixed'},
  {id:'insurance',   name:'Insurance',         emoji:'🛡️', budget:1640, group:'Fixed'},
  {id:'debt',        name:'Debt Payments',     emoji:'💳',  budget:920,  group:'Fixed'},
  {id:'education',   name:'Education',         emoji:'📚',  budget:300,  group:'Fixed'},
  // Flex
  {id:'entertainment',name:'Entertainment',   emoji:'🎬',  budget:0,    group:'Flex'},
  {id:'gifts',       name:'Gifts',             emoji:'🎁',  budget:0,    group:'Flex'},
  {id:'technology',  name:'Technology',         emoji:'💻',  budget:0,    group:'Flex'},
  {id:'travel',      name:'Travel',             emoji:'✈️', budget:0,    group:'Flex'},
  {id:'other',       name:'Other',              emoji:'🎲',  budget:0,    group:'Flex'}
];

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const LS_KEY='bobelle_budget_2026';
let curMonth=new Date().getMonth(), selWho='Bob', selCat=null;

function load(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{expenses:[],budgets:{}}}catch(e){return{expenses:[],budgets:{}}}}
function persist(d){localStorage.setItem(LS_KEY,JSON.stringify(d))}
function getBudget(catId,m){const d=load();const k=`${catId}_${m}`;if(k in d.budgets)return d.budgets[k];const c=ALL_CATS.find(c=>c.id===catId);return c?c.budget:0}
function setBudget(catId,m,v){const d=load();d.budgets[`${catId}_${m}`]=v;persist(d)}
function getExpenses(m){return load().expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===2026})}
function fmt(n){return(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString()}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

function render(){
  document.getElementById('monthLabel').textContent=MONTHS[curMonth]+' 2026';
  const exps=getExpenses(curMonth);
  let totalBudget=0,totalSpent=0;
  const spent={};
  ALL_CATS.forEach(c=>{totalBudget+=getBudget(c.id,curMonth);spent[c.id]=0});
  exps.forEach(e=>{spent[e.cat]=(spent[e.cat]||0)+e.amount;totalSpent+=e.amount});
  
  document.getElementById('sBudget').textContent=fmt(totalBudget);
  const sS=document.getElementById('sSpent');sS.textContent=fmt(totalSpent);sS.className='val '+(totalSpent>totalBudget?'red':'teal');
  const left=totalBudget-totalSpent;
  const sL=document.getElementById('sLeft');sL.textContent=fmt(left);sL.className='val '+(left<0?'red':'green');

  // ── OVERVIEW ──
  const groups=['Everyday','Variable','Fixed','Flex'];
  let oh='';
  groups.forEach(g=>{
    const cats=ALL_CATS.filter(c=>c.group===g);
    const gSpent=cats.reduce((s,c)=>s+(spent[c.id]||0),0);
    const gBudget=cats.reduce((s,c)=>s+getBudget(c.id,curMonth),0);
    if(gBudget===0&&gSpent===0&&g==='Flex')return;
    oh+=`<div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 0 4px">${g} · ${fmt(gSpent)} / ${fmt(gBudget)}</div>`;
    cats.forEach(c=>{
      const b=getBudget(c.id,curMonth),s=spent[c.id]||0;
      if(b===0&&s===0)return;
      const pct=b?Math.min((s/b)*100,100):s>0?100:0;
      const cls=b===0?(s>0?'warn':'ok'):s>b?'over':s>b*.8?'warn':'ok';
      const leftC=b-s;
      oh+=`<div class="cat-card" onclick="this.classList.toggle('expanded')">
        <div class="cat-head"><div class="left"><span class="emoji">${c.emoji}</span><span class="name">${c.name}</span></div>
        <div class="amounts"><span class="spent ${s>b&&b>0?'red':''}">${fmt(s)}</span> / ${fmt(b)}<br><span style="font-size:.68rem;color:${leftC<0?'var(--danger)':'var(--ok)'}">${leftC>=0?fmt(leftC)+' left':'Over '+fmt(-leftC)}</span></div></div>
        <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="sub-items">${exps.filter(e=>e.cat===c.id).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>`<div class="sub-row"><span>${new Date(e.date).toLocaleDateString('en',{month:'short',day:'numeric'})} · ${e.who}${e.note?' · '+e.note:''}</span><span>${fmt(e.amount)}</span></div>`).join('')||'<div style="color:var(--muted)">No expenses</div>'}</div>
      </div>`;
    });
  });
  document.getElementById('v-overview').innerHTML=oh;

  // ── HISTORY ──
  const sorted=[...exps].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let hh='';
  if(!sorted.length)hh='<div class="empty">No expenses yet this month.<br>Tap <strong>+</strong> to add one!</div>';
  let lastDay='';
  sorted.forEach(e=>{
    const dt=new Date(e.date);
    const day=dt.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});
    if(day!==lastDay){hh+=`<div class="day-header">${day}</div>`;lastDay=day}
    const c=ALL_CATS.find(x=>x.id===e.cat)||{emoji:'❓',name:'?'};
    hh+=`<div class="expense-item"><span class="em">${c.emoji}</span><div class="info"><div class="top"><span>${c.name}</span><span>${fmt(e.amount)}</span></div><div class="bot">${e.who}${e.note?' · '+e.note:''}</div></div><button class="del" onclick="event.stopPropagation();delExpense('${e.id}')">✕</button></div>`;
  });
  document.getElementById('v-history').innerHTML=hh;

  // ── SETTINGS ──
  let sh='';
  groups.forEach(g=>{
    sh+=`<div class="section-label">${g}</div>`;
    ALL_CATS.filter(c=>c.group===g).forEach(c=>{
      sh+=`<div class="setting-row"><span class="em">${c.emoji}</span><div style="flex:1"><div class="name">${c.name}</div></div><input type="number" inputmode="numeric" value="${getBudget(c.id,curMonth)}" onchange="setBudget('${c.id}',${curMonth},+this.value);render()"></div>`;
    });
  });
  sh+=`<div class="action-btns">
    <button onclick="exportJSON()">📤 Export JSON</button>
    <button onclick="exportCSV()">📊 Export CSV</button>
    <button onclick="copyToMonth()">📋 Copy Budget →</button>
    <button class="danger" onclick="clearMonth()">🗑 Clear Month</button>
  </div>`;
  document.getElementById('v-settings').innerHTML=sh;
}

function showTab(t){
  document.querySelectorAll('.tabs button').forEach((b,i)=>b.classList.toggle('active',['overview','history','settings'][i]===t));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='v-'+t));
}
function changeMonth(d){curMonth+=d;if(curMonth>11)curMonth=0;if(curMonth<0)curMonth=11;render()}

// ── MODAL ──
function openModal(){
  document.getElementById('modal').classList.add('open');
  document.getElementById('amtInput').value='';
  document.getElementById('noteInput').value='';
  selCat=null;renderCatGrid();checkSave();
  setTimeout(()=>document.getElementById('amtInput').focus(),100);
}
function closeIfBg(e){if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open')}
function pickWho(w){selWho=w;document.getElementById('wBob').classList.toggle('sel',w==='Bob');document.getElementById('wElle').classList.toggle('sel',w==='Elle')}

function renderCatGrid(){
  const exps=getExpenses(curMonth);
  const spent={};QUICK_CATS.forEach(c=>spent[c.id]=0);
  exps.forEach(e=>{if(e.cat in spent)spent[e.cat]+=e.amount});
  let h='';
  QUICK_CATS.forEach(c=>{
    const b=getBudget(c.id,curMonth),s=spent[c.id]||0,left=b-s;
    h+=`<div class="cat-btn ${selCat===c.id?'sel':''}" onclick="pickCat('${c.id}')"><span class="em">${c.emoji}</span>${c.name}<span class="left-amt">${left>=0?fmt(left)+' left':fmt(-left)+' over'}</span></div>`;
  });
  document.getElementById('catGrid').innerHTML=h;
}
function pickCat(id){selCat=id;renderCatGrid();checkSave()}
function checkSave(){document.getElementById('saveBtn').disabled=!(selCat&&document.getElementById('amtInput').value>0)}
document.getElementById('amtInput').addEventListener('input',checkSave);

function saveExpense(){
  const amt=parseFloat(document.getElementById('amtInput').value);if(!amt||!selCat)return;
  const d=load();
  d.expenses.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),cat:selCat,amount:amt,who:selWho,note:document.getElementById('noteInput').value.trim(),date:new Date().toISOString()});
  persist(d);document.getElementById('modal').classList.remove('open');
  const c=QUICK_CATS.find(x=>x.id===selCat);
  toast(`✓ ${fmt(amt)} → ${c?c.emoji+' '+c.name:selCat}`);
  render();
}
function delExpense(id){if(!confirm('Delete this expense?'))return;const d=load();d.expenses=d.expenses.filter(e=>e.id!==id);persist(d);render();toast('Deleted')}
function clearMonth(){if(!confirm('Delete ALL expenses for '+MONTHS[curMonth]+'?'))return;const d=load();d.expenses=d.expenses.filter(e=>{const dt=new Date(e.date);return!(dt.getMonth()===curMonth&&dt.getFullYear()===2026)});persist(d);render();toast('Month cleared')}

function exportJSON(){const b=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});dl(b,'budget-2026.json')}
function exportCSV(){
  const exps=load().expenses.sort((a,b)=>new Date(a.date)-new Date(b.date));
  let csv='Date,Category,Amount,Who,Note\n';
  exps.forEach(e=>{const c=ALL_CATS.find(x=>x.id===e.cat);csv+=`${e.date},${c?c.name:e.cat},${e.amount},${e.who},"${e.note||''}"\n`});
  dl(new Blob([csv],{type:'text/csv'}),'budget-2026.csv');
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()}
function copyToMonth(){
  const next=(curMonth+1)%12;
  if(!confirm(`Copy ${MONTHS[curMonth]} budgets → ${MONTHS[next]}?`))return;
  const d=load();
  ALL_CATS.forEach(c=>{d.budgets[`${c.id}_${next}`]=getBudget(c.id,curMonth)});
  persist(d);toast(`Copied to ${MONTHS[next]}`);
}

pickWho('Bob');render();
</script>
</body>
</html>
